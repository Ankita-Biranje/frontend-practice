<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link href="style.css" rel="stylesheet">
</head>
<body>
    
<div class="login-container">
    <div class="login-box">
        <h2>🌱 Welcome!!</h2>
        <p class="subtitle">Login to our Greenleaves Nursery Shop account</p>

        <form>
            <div class="input-group">
                <label>Email</label>
                <input type="email" placeholder="Enter your email" class="form-control"  required/>
            </div>

            <div class="input-group ">
                <label>Password</label>
                <input type="password" placeholder="Enter your password" class="form-control" required />
            </div>

            <button type="submit">Login</button>

            <p class="signup-text">
                New here? <a href="#">Create an account</a>
            </p>
        </form>
    </div>
</div>
</body>
</html>
