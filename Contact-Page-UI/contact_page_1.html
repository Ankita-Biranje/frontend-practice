<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Page UI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>
    <div class="container py-5 px-3" style="align-items: center;margin-top: 90px;">
        <div class="row">
            <div class="col-1"></div>
            <div class="col-10">
                <div class="row p-2 shadow rounded-5">
                    <div class="col-7 text-success" style="padding: 10px;  font-family: Arial, Helvetica, sans-serif;">
                        <div style="padding: 10px;">
                            <h2>Do You Have A Question ?</h2>
                        </div>
                        <br>
                        <div class="row" style="padding: 10px;">
                            <div class="col-6 ">
                                <input type="text" class="form-control" placeholder="Enter Fullname">
                            </div>
                            <div class="col-6">
                                <input type="email" class="form-control" placeholder="Enter Email">
                            </div>
                        </div>
                        <br>
                        <div style="padding: 10px;">
                            <input type="number" class="form-control" placeholder="Phone Number">
                        </div>
                        <br>
                        <div style="padding: 10px;">
                            <textarea style="width: 100%;" class="form-control" rows="3"
                                placeholder="Comment"></textarea>
                        </div>
                        <div style="padding: 10px;">
                            <input type="submit" value="Save"
                                style="width: 100%; background-color: #198754; color: white; border-radius: 20px; padding: 5px; border: none;">
                        </div>
                    </div>
                    <div class="col-5   text-success "
                        style="padding: 20px; font-family: Arial, Helvetica, sans-serif;">

                        <h2>Get In Touch With us !!</h2>
                        <br>
                        <p> <strong> 🏠Address:</strong>
                            <br>
                            🌱Greenleaves Nursery

                            <br>
                            365/12, Marketyard, Sankeshwar Road, Gadhinglaj, Pincode-416506

                        </p>
                        <p>
                            <strong> ✉️Email :</strong>
                            <br>
                            greenleavesplants@gmail.com

                        </p>
                        <p>
                            <strong>📞Contact No : </strong>
                            <br>
                            (+91) 9876543210

                        </p>
                        <p>
                            <strong>ℹ️ Store info :</strong>
                            <br>
                            Monday - Saturday

                            <br>
                            10.00 AM - 06.00 PM

                        </p>
                        <br>
                    </div>
                </div>
            </div>

        </div>
    </div>
</body>

</html>
