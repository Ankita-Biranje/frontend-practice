<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Page UI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<style>
    * {
        margin: 0px;
        padding: 0px;
    }

    body {
        background-color: whitesmoke;
    }

    .container {
        margin-top: 90px;
        align-items: center;
        font-family: Arial, Helvetica, sans-serif;
    }
</style>

<body>

    <div class="container container py-5 px-3">
        <div class="row">
            <div class="col-2"></div>
            <div class="col-8 ">
                <div class="row shadow ">
                    <div class="col-6 p-5 bg-success">
                        <h2 class="text-center text-light">Get In Touch</h2>
                        <br>

                        <h4 class="text-center text-light">🌱Greenleaves Nursery</h4>

                        <p class="text-center text-light">365/12, Marketyard, Sankeshwar Road, Gadhinglaj,
                            Pincode-416506
                            <br>
                            <br>
                            greenleavesplants@gmail.com
                            <br>
                            (+91) 9876543210<br>
                        </p>
                    </div>
                    <div class="col-6 p-5 bg-light">
                        <div class="row">
                            <h2 class="text-center text-success"> 🍃Contact Us</h2>
                            <div class="col-6 text-success">
                                <label> First Name </label>
                                <br>
                                <input type="text" class="form-control">
                            </div>
                            <div class="col-6 text-success">
                                <label> Last Name </label>
                                <br>
                                <input type="text" class="form-control ">
                            </div>
                            <div class="text-success">
                                <label> Email </label>
                                <br>
                                <input type="email" class="form-control ">
                            </div>
                            <div class="text-success">
                                <label> Phone Number</label>
                                <br>
                                <input type="number" class="form-control ">
                            </div>
                            <div>
                                <input type="submit" value="Submit" class="btn btn-success mt-3">
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
