<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Page UI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
   <div class="container" style="align-items: center;
    padding: 80px 150px;">
    <div class="row">
        <div class="col-2"></div>
        <div class="col-8 shadow">
            <div class="row p-5" style="  font-family: Arial, Helvetica, sans-serif; background: #368761">
                <h3 class="text-center text-light">🍃Contact Us</h3>
                <p class="text-center text-light">
                      heading="Your dream garden is just a click away—let’s grow together and make every space bloom with life!";

                </p>
                <div class="col-2"></div>
                <div class="col-8 " style=" background-color: white; padding: 30px;">
                    <div class="row">
                        <div class="col-6">
                            <label for="" style="margin: 5px; color: #198754;"> Full Name</label>
                            <input type="text" class="form-control">
                        </div>
                        <div class="col-6">
                            <label for="" style="margin: 5px; color: #198754;">Email Address</label>
                            <input type="email" class="form-control">
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-sm-12">
                            <label for="" style="margin: 5px; color: #198754;">Subject</label>
                            <input type="text" class="form-control">
                        </div>
                        <div class="col-sm-12">
                            <label for="" style="margin: 5px; color: #198754;"> Message</label>
                            <br>
                            <textarea name="textarea" id="" class="form-control"
                                placeholder="Write Message "></textarea>
                        </div>
                        <div class="col-12 text-center mt-4">
                            <button
                                style=" color: white; border:none;width: 100%;background:#198754;border-radius: 20px;padding: 5px;">Send
                                Message</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div> 
</body>
</html>
